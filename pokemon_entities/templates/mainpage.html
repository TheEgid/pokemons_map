{% extends "base.html" %}

{% block content %}
<section class="mb-5">
  <h1 class="mb-4">Покемоны</h1>
  <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-4">
    {% for pokemon in pokemons %}
      <div class="col">
        <a href="{% url 'pokemon_detail' pokemon.pokemon_id %}" class="text-decoration-none">
          <div class="card h-100 text-center">
            <div class="card-body p-3">
              <img src="{{ pokemon.img_url }}" alt="{{ pokemon.title_ru }}" class="mb-2" style="width: 120px; height: 120px; object-fit: contain;">
              <p class="card-text fw-bold text-dark mb-0">{{ pokemon.title_ru }}</p>
            </div>
          </div>
        </a>
      </div>
    {% endfor %}
  </div>
</section>

<section>
  <h2 class="mb-3">Карта покемонов в Москве</h2>
  <div class="border rounded mb-5" style="height: 500px; overflow: hidden;">
    {{ map|safe }}
  </div>
</section>
{% endblock %}
