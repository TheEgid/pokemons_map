{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokemon Go Map</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="https://assets.pokemon.com/static2/_ui/img/favicon.ico">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" href="{% url 'index' %}">Pokemon Go Map</a>
    </div>
  </nav>

  <main class="container my-5">
    <section class="mb-5">
      <h1 class="mb-4">Покемоны</h1>
      <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 g-3">
        {% for pokemon in pokemons %}
          <div class="col">
            <a href="{% url 'pokemon_detail' pokemon.pokemon_id %}" class="text-decoration-none">
              <div class="card h-100">
                <div class="card-body d-flex align-items-center">
                  <img src="{{ pokemon.img_url }}" alt="{{ pokemon.title_ru }}" class="me-3" style="width: 50px; height: 50px; object-fit: contain;">
                  <span class="text-dark">{{ pokemon.title_ru }}</span>
                </div>
              </div>
            </a>
          </div>
        {% endfor %}
      </div>
    </section>

    <section>
      <h2 class="mb-3">Карта покемонов в Москве</h2>
      <div class="border rounded p-2">
        {{ map|safe }}
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
